server:
  port: 8087

spring:
  application:
    name: mcp-server
  ai:
    mcp:
      server:
        name: banking-mcp-server
        version: 1.0.0

# Optional core-banking service the tools try to call before falling back to simulated data.
core-banking:
  uri: ${CORE_BANKING_URI:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
